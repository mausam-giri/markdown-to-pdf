<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div class="brand-text">
          <strong>MarkForge</strong>
          <span>Markdown → HTML → PDF</span>
        </div>
      </div>

      <div class="toolbar">
        <div class="pane-toggles" role="group" aria-label="Pane visibility">
          <button type="button" class="btn-icon" id="btn-toggle-editor" title="Hide editor" aria-pressed="false" aria-label="Toggle editor">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 6h10M4 12h7M4 18h10" />
              <path d="M18 5v14M15 8l3-3 3 3M15 16l3 3 3-3" />
            </svg>
          </button>
          <button type="button" class="btn-icon" id="btn-toggle-preview" title="Hide preview" aria-pressed="false" aria-label="Toggle preview">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <label class="field-inline">
          <span>Page</span>
          <select id="page-size" title="PDF page size">
            <option value="a4" selected>A4</option>
            <option value="letter">Letter</option>
          </select>
        </label>
        <button type="button" class="btn btn-ghost" id="btn-pdf-preview" title="Open print-ready preview">
          PDF Preview
        </button>
        <button type="button" class="btn btn-primary" id="btn-export" title="Download as PDF">
          Export PDF
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="pane editor-pane" aria-label="Editors">
        <div class="tabs" role="tablist">
          <button type="button" class="tab active" role="tab" aria-selected="true" data-tab="markdown">Markdown</button>
          <button type="button" class="tab" role="tab" aria-selected="false" data-tab="css">Custom CSS</button>
          <div class="tabs-spacer"></div>
          <button type="button" class="btn-text" id="btn-reset" title="Restore sample content">Reset</button>
        </div>

        <div id="md-toolbar" class="md-toolbar" role="toolbar" aria-label="Markdown formatting">
          <div class="md-group">
            <button type="button" class="md-btn" data-md="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
            <button type="button" class="md-btn" data-md="italic" title="Italic (Ctrl+I)"><em>I</em></button>
            <button type="button" class="md-btn" data-md="strike" title="Strikethrough"><s>S</s></button>
            <button type="button" class="md-btn" data-md="highlight" title="Highlight">==</button>
          </div>
          <div class="md-group">
            <button type="button" class="md-btn" data-md="h1" title="Heading 1">H1</button>
            <button type="button" class="md-btn" data-md="h2" title="Heading 2">H2</button>
            <button type="button" class="md-btn" data-md="h3" title="Heading 3">H3</button>
            <button type="button" class="md-btn" data-md="h4" title="Heading 4">H4</button>
          </div>
          <div class="md-group">
            <button type="button" class="md-btn" data-md="link" title="Link">Link</button>
            <button type="button" class="md-btn" data-md="image" title="Image">Img</button>
            <button type="button" class="md-btn" data-md="code" title="Inline code">&lt;/&gt;</button>
            <button type="button" class="md-btn" data-md="codeblock" title="Code block">{ }</button>
          </div>
          <div class="md-group">
            <button type="button" class="md-btn" data-md="quote" title="Blockquote">“ ”</button>
            <button type="button" class="md-btn" data-md="ul" title="Bullet list">• List</button>
            <button type="button" class="md-btn" data-md="ol" title="Numbered list">1. List</button>
            <button type="button" class="md-btn" data-md="task" title="Task list">☑</button>
          </div>
          <div class="md-group">
            <button type="button" class="md-btn" data-md="table" title="Table">Table</button>
            <button type="button" class="md-btn" data-md="hr" title="Horizontal rule">―</button>
            <button type="button" class="md-btn" data-md="pagebreak" title="Page break">Page ↵</button>
            <button type="button" class="md-btn" data-md="footnote" title="Footnote">[^]</button>
            <button type="button" class="md-btn" data-md="toc" title="Table of contents">TOC</button>
          </div>
        </div>

        <textarea
          id="markdown-input"
          class="code-area active"
          spellcheck="false"
          aria-label="Markdown source"
          placeholder="Write markdown…"
        ></textarea>
        <div id="css-editor-host" class="code-area css-editor-host">
          <textarea
            id="css-input"
            spellcheck="false"
            aria-label="Custom CSS"
            placeholder="Customize document styles…"
          ></textarea>
        </div>
      </section>

      <div class="splitter" id="splitter" role="separator" aria-orientation="vertical" aria-label="Resize panes"></div>

      <section class="pane preview-pane" aria-label="Live preview">
        <div class="preview-meta">
          <span>Live preview</span>
          <span id="preview-stats" class="muted">0 words</span>
        </div>
        <div class="preview-stage">
          <article id="html-preview" class="markdown-body page-sheet"></article>
        </div>
      </section>
    </main>
  </div>

  <!-- PDF Preview Modal -->
  <dialog id="pdf-dialog" class="pdf-dialog">
    <div class="pdf-dialog-chrome">
      <div class="pdf-dialog-title">
        <strong>PDF Preview</strong>
        <span class="muted">Dashed lines mark page breaks · use <code>data-pagebreak</code> for manual breaks</span>
      </div>
      <div class="pdf-dialog-actions">
        <button type="button" class="btn btn-ghost" id="btn-zoom-out" title="Zoom out">−</button>
        <span id="zoom-label" class="zoom-label">100%</span>
        <button type="button" class="btn btn-ghost" id="btn-zoom-in" title="Zoom in">+</button>
        <button type="button" class="btn btn-primary" id="btn-export-from-preview">Export PDF</button>
        <button type="button" class="btn btn-ghost" id="btn-close-preview" title="Close">Close</button>
      </div>
    </div>
    <div class="pdf-dialog-body">
      <div id="pdf-pages" class="pdf-pages"></div>
    </div>
  </dialog>

  <style id="user-styles"></style>

  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/edit/closebrackets.min.js"></script>
  <script src="static/app.js"></script>
</body>
